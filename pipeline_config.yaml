# Fresh CF Pipeline Configuration
# YAML configuration for the counterfactual generation pipeline

pipeline:
  n_iterations: 100  # Number of times to generate fresh CFs
  n_patients: 48     # Number of high-risk patients to analyze
  n_workers: 4       # Number of concurrent workers (adjust based on CPU cores)
  test_mode: false   # Set to true for quick testing (5 patients, 5 iterations)

dice:
  model_path: "model/xgb_pipeline.pkl"
  data_path: "data/heart_statlog_cleveland_hungary_final.csv"
  method: "genetic"
  total_cfs: 5
  permitted_range:
    trestbps: [100, 120]
    chol: [150, null]  # null means use 90% of original value
  timeout: 30  # Timeout in seconds for CF generation

scm:
  n_samples: 1  # Single sample with fixed seed per patient-CF pair for reproducibility

output:
  base_dir: "fresh_cf_iterations"
  keep_all_iterations: false  # Set true to keep all CF files (uses more disk space)

ci:
  confidence_level: 0.95  # 95% confidence intervals

sensitivity:
  n_iterations: 10       # Iterations per variant (reduced for speed)
  n_patients: 10         # Patients per variant
  parameters:            # Parameter grid for OAT sensitivity sweeps
    total_cfs: [3, 5, 7, 10]
    trestbps_range: [[90, 110], [100, 120], [110, 130], [120, 140]]
    chol_lower: [100, 150, 200]
    confidence_level: [0.90, 0.95, 0.99]  # Post-hoc recomputation only
